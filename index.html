<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Join the room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,400;9..144,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --turf:#0f3d2e;
    --turf-deep:#0a2c21;
    --slip:#f4ecd8;
    --slip-line:#d9cdaf;
    --ink:#21251f;
    --ink-soft:#5b5f54;
    --gold:#c8961e;
    --gold-deep:#9a6f12;
    --win:#1d7a4c;
    --lose:#a3402d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'DM Sans',system-ui,sans-serif;
    background:var(--turf);
    background-image:
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(255,255,255,0.02) 38px 39px),
      radial-gradient(120% 80% at 50% -10%, #15543d 0%, var(--turf) 45%, var(--turf-deep) 100%);
    color:var(--slip);
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:24px 18px calc(24px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }

  /* Masthead */
  .mast{width:100%;max-width:440px;text-align:center;margin:8px 0 22px}
  .mast .rail{
    display:inline-flex;align-items:center;gap:10px;
    font-family:'Bebas Neue',sans-serif;letter-spacing:.14em;
    font-size:13px;color:var(--gold);text-transform:uppercase;
  }
  .mast .rail::before,.mast .rail::after{
    content:"";width:34px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));
  }
  .mast .rail::after{transform:scaleX(-1)}
  .mast h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(46px,16vw,68px);line-height:.92;letter-spacing:.01em;
    color:var(--slip);margin-top:6px;
    text-shadow:0 2px 0 rgba(0,0,0,.25);
  }
  .mast h1 em{font-style:normal;color:var(--gold)}

  /* The slip card */
  .slip{
    width:100%;max-width:440px;
    background:var(--slip);color:var(--ink);
    border-radius:14px;
    padding:26px 22px 24px;
    position:relative;
    box-shadow:0 18px 40px rgba(0,0,0,.34), 0 2px 0 #fffdf6 inset;
    background-image:repeating-linear-gradient(transparent 0 31px, var(--slip-line) 31px 32px);
    background-position:0 64px;
  }
  .slip::before{
    content:"";position:absolute;left:0;right:0;top:-7px;height:14px;
    background:radial-gradient(circle at 8px 7px, transparent 0 5px, var(--slip) 5px) 0 0/16px 14px repeat-x;
  }
  .slip h2{
    font-family:'Fraunces',serif;font-weight:600;font-size:22px;
    letter-spacing:-.01em;margin-bottom:2px;
  }
  .slip .sub{font-size:13px;color:var(--ink-soft);margin-bottom:20px}

  label{display:block;font-size:12px;font-weight:600;letter-spacing:.06em;
    text-transform:uppercase;color:var(--gold-deep);margin:0 0 7px 2px}

  input{
    width:100%;font-family:inherit;
    background:#fffdf6;border:1.5px solid var(--slip-line);
    border-radius:9px;padding:13px 14px;color:var(--ink);
    font-size:17px;transition:border-color .15s, box-shadow .15s;
  }
  input::placeholder{color:#b3a988}
  input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,150,30,.18)}

  #code{
    font-family:'Bebas Neue',sans-serif;letter-spacing:.42em;
    font-size:38px;text-align:center;text-indent:.42em;
    padding:10px 14px;color:var(--turf);
  }
  .field{margin-bottom:18px}

  button{
    width:100%;font-family:'Bebas Neue',sans-serif;letter-spacing:.10em;
    font-size:24px;border:none;border-radius:10px;cursor:pointer;
    padding:15px;margin-top:4px;color:#fff;
    background:linear-gradient(180deg,#15543d,var(--turf));
    box-shadow:0 3px 0 var(--turf-deep);transition:transform .08s, box-shadow .08s;
  }
  button:active{transform:translateY(2px);box-shadow:0 1px 0 var(--turf-deep)}
  button:disabled{opacity:.55;cursor:default;box-shadow:0 3px 0 var(--turf-deep)}

  .msg{min-height:18px;margin-top:12px;font-size:13.5px;text-align:center}
  .msg.err{color:var(--lose);font-weight:600}
  .msg.ok{color:var(--win);font-weight:600}

  footer{margin-top:auto;padding-top:26px;font-size:11px;letter-spacing:.08em;
    text-transform:uppercase;color:rgba(244,236,216,.4)}
</style>
</head>
<body>

  <div class="mast">
    <span class="rail">Tonight at the track</span>
    <h1>Join <em>the</em> room</h1>
  </div>

  <section class="slip">
    <h2>Take your seat</h2>
    <p class="sub">Enter the code shown on the big screen, then pick a name your rivals will remember.</p>

    <div class="field">
      <label for="code">Room code</label>
      <input id="code" maxlength="4" autocomplete="off" autocapitalize="characters"
             spellcheck="false" inputmode="latin" placeholder="ABCD">
    </div>

    <div class="field">
      <label for="name">Display name</label>
      <input id="name" maxlength="20" autocomplete="off" placeholder="Lucky Lou">
    </div>

    <button id="join-btn">Join the room</button>
    <p id="msg" class="msg"></p>
  </section>

  <footer>Play money only · No real wagering</footer>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ───────────────────────────────────────────────────────────────
   Supabase credentials (safe in client code; RLS protects data).
─────────────────────────────────────────────────────────────── */
const SUPABASE_URL  = 'https://lhzxsjjgsvlnlixygjif.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxoenhzampnc3ZsbmxpeHlnamlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MjI4MjIsImV4cCI6MjA5ODE5ODgyMn0.-AyZ1kr3iNwk7iAyPhGlqmHXvASBYWBtPSiROP6pSsQ';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ───────────────────────────────────────────────────────────────
   Route convention (no map needed):
   the player-view page for a mode is named after the game_mode
   string the screen stored on the session. mode 'horses'
   → 'horses.html'. Add a game by creating a page whose
   filename matches its mode string — nothing to register here.
─────────────────────────────────────────────────────────────── */
const KNOWN_MODES = ['horses'];   // guard list; extend as you add pages
const routeForMode = mode => `${mode}.html`;

/* ─── element refs ─── */
const $ = id => document.getElementById(id);
const codeInput = $('code'), nameInput = $('name'), joinBtn = $('join-btn'), msg = $('msg');

/* ─── helpers ─── */
function showMsg(text, kind){ msg.textContent = text; msg.className = 'msg' + (kind ? ' '+kind : ''); }

/* keep code box uppercase + letters only */
codeInput.addEventListener('input', () => {
  codeInput.value = codeInput.value.replace(/[^a-zA-Z]/g,'').toUpperCase().slice(0,4);
});

/* ─── join flow ─── */
joinBtn.addEventListener('click', joinRoom);
nameInput.addEventListener('keydown', e => { if(e.key==='Enter') joinRoom(); });
codeInput.addEventListener('keydown', e => { if(e.key==='Enter') nameInput.focus(); });

async function joinRoom(){
  const code = codeInput.value.trim().toUpperCase();
  const name = nameInput.value.trim();
  if(code.length !== 4){ showMsg('Room codes are four letters.', 'err'); return; }
  if(!name){ showMsg('Pick a display name first.', 'err'); return; }

  joinBtn.disabled = true; showMsg('Finding the room…');

  // 1) Join — inserts the player, returns the players row (id, session_id, …).
  const { data: player, error } = await supabase.rpc('join_session', {
    p_room_code: code, p_display_name: name,
  });

  if(error){
    joinBtn.disabled = false;
    const m = (error.message||'').toLowerCase();
    if(m.includes('no active session')) showMsg('No room with that code. Check the big screen.', 'err');
    else if(m.includes('not accepting')) showMsg('That game has already started.', 'err');
    else if(m.includes('duplicate') || m.includes('unique')) showMsg('That name’s taken in this room. Try another.', 'err');
    else showMsg(error.message, 'err');
    return;
  }

  // 2) The join RPC returns only the player row, so do one cheap read to learn
  //    the game mode → which player view to redirect to.
  const { data: session, error: sErr } = await supabase
    .from('sessions').select('game_mode').eq('id', player.session_id).single();

  if(sErr || !session){
    joinBtn.disabled = false;
    showMsg('Joined, but couldn’t read the game. Try again.', 'err');
    return;
  }

  const route = KNOWN_MODES.includes(session.game_mode)
    ? routeForMode(session.game_mode)
    : null;
  if(!route){
    joinBtn.disabled = false;
    showMsg('Unknown game mode for this room.', 'err');
    return;
  }

  // 3) Redirect to the game's player view. The URL carries the two keys the
  //    next page needs to rebuild everything from the DB on load/refresh:
  //    room code (→ session row) and player id (→ this player's row).
  showMsg('You’re in! Taking you to the game…', 'ok');
  const url = `${route}?code=${encodeURIComponent(code)}&pid=${encodeURIComponent(player.id)}`;
  window.location.href = url;
}
</script>
</body>
</html>
