// ══════════════════════════════
//  SLOW MO SYSTEM — STATE RECORDING
// ══════════════════════════════
// Records lightweight horse state snapshots near the finish line.
// Replay feeds those back into the existing render pipeline — no screenshots needed.

function startClusterRecording(members) {
  // members: Set of horse objects that form the cluster — recording continues until all have finished
  // plus a hold buffer so the loser's crossing and board update are fully captured
  activeSlot = { frames:[], members, holdFramesRemaining: 0, allCrossed: false };
  isRecording = true;
}

function stopClusterRecording(gap) {
  if(activeSlot) {
    const memberPositions = [...activeSlot.members]
      .map(h => finishOrder.indexOf(h))
      .filter(idx => idx >= 0 && idx <= 3)
      .sort((a,b) => a - b);

    if(gap <= CONFIG.closeFinishFrames) {
      // Genuinely close — confirm photoFinishPositions (already speculatively set)
      memberPositions.forEach(idx => photoFinishPositions.add(idx));
      if(!replaySlot) {
        replaySlot = { frames: activeSlot.frames, gap };
      } else {
        secondaryCloseGap = gap;
      }
    } else {
      // Not actually close — clear the speculative photoFinishPositions so
      // the board shows real names, not PHOTO FINISH
      memberPositions.forEach(idx => photoFinishPositions.delete(idx));
    }
    activeSlot = null;
  }
  isRecording = false;
  // Redraw board with confirmed state
  updateFinishBoard();
}

function stopReplayRecording() {
  // If a cluster is still recording when race ends, close it using the actual member gaps
  // rather than the last two finishers (which may not be the cluster pair).
  if(activeSlot && activeSlot.frames.length > 0) {
    // Find the two most recent finishers that were cluster members
    const memberFinishers = finishOrder.filter(h => activeSlot.members.has(h));
    const gap = memberFinishers.length >= 2
      ? Math.abs(memberFinishers[memberFinishers.length-1].finishTick - memberFinishers[memberFinishers.length-2].finishTick)
      : 999;
    stopClusterRecording(gap);
  }
  activeSlot = null;
  isRecording = false;
}

function snapshotBoardState() {
  // Snapshot full innerHTML + styles for every board cell — needed since silk cells
  // use img+span structure that textContent would destroy on restore
  const rows = [];
  for(let i = 0; i < CONFIG.horsesPerRace; i++) {
    const numEl  = document.getElementById(`board-num-${i}`);
    const nameEl = document.getElementById(`board-name-${i}`);
    const timeEl = document.getElementById(`board-time-${i}`);
    const mrgEl  = document.getElementById(`board-mrg-${i}`);
    rows.push({
      numCss:   numEl  ? numEl.style.cssText   : '',
      numHTML:  numEl  ? numEl.innerHTML        : '',
      nameText: nameEl ? nameEl.textContent     : '',
      nameColor:nameEl ? nameEl.style.color     : '',
      timeText: timeEl ? timeEl.textContent     : '',
      timeColor:timeEl ? timeEl.style.color     : '',
      mrgText:  mrgEl  ? mrgEl.textContent      : '',
    });
  }
  return rows;
}

function restoreBoardState(rows) {
  if(!rows) return;
  rows.forEach((r, i) => {
    const numEl  = document.getElementById(`board-num-${i}`);
    const nameEl = document.getElementById(`board-name-${i}`);
    const timeEl = document.getElementById(`board-time-${i}`);
    const mrgEl  = document.getElementById(`board-mrg-${i}`);
    if(numEl)  { numEl.style.cssText = r.numCss; numEl.innerHTML = r.numHTML; }
    if(nameEl) { nameEl.textContent = r.nameText; nameEl.style.color = r.nameColor; }
    if(timeEl) { timeEl.textContent = r.timeText; timeEl.style.color = r.timeColor; }
    if(mrgEl)  { mrgEl.textContent  = r.mrgText; }
  });
}

function recordReplayFrame() {
  if(!isRecording || !activeSlot) return;
  activeSlot.frames.push({
    cameraX:    cameraX,
    zoom:       currentZoom,
    boardState: snapshotBoardState(),
    horses: horses.map(h => ({
      worldX:    h.worldX,
      animName:  h.animName,
      animFrame: h.animFrame,
      finished:  h.finished,
      dead:      h.dead,
    }))
  });
}

// Render a single recorded frame onto the existing horse DOM elements
function renderReplayFrame(frame, sh) {
  cameraX    = frame.cameraX;
  currentZoom = frame.zoom;
  applyCamera();
  restoreBoardState(frame.boardState);
  frame.horses.forEach((s, i) => {
    const h = horses[i];
    if(!h) return;
    h.worldX    = s.worldX;
    h.animName  = s.animName;
    h.animFrame = s.animFrame;
    positionHorse(h);
    drawHorse(h);
  });
}

// Play replay passes times at interval ms/frame, then call onDone.
// mode: 'race' = use race cam in full stage, 'winner' = locked finish cam scaled to postrace-cam tile
// frames: the specific replayFrames array to play
function playReplayIn(mode, frames, passes, interval, onDone) {
  if(!frames || frames.length === 0) { if(onDone) onDone(); return; }
  const sh = getRaceStageH();
  let frameIdx = 0, passCount = 0;

  const finishLockedX = Math.max(0, finishStageX() - VIEWPORT_W * 0.65);
  const winnerZoom = 1.1;

  function step() {
    if(frameIdx >= frames.length) {
      passCount++;
      if(passCount >= passes) { if(onDone) onDone(); return; }
      frameIdx = 0;
    }
    const frame = frames[frameIdx++];
    const renderFrame = mode === 'winner'
      ? Object.assign({}, frame, { cameraX: finishLockedX, zoom: winnerZoom })
      : frame;
    renderReplayFrame(renderFrame, sh);
    replayAnimId = setTimeout(step, interval);
  }
  step();
}

function stopReplay() {
  clearTimeout(replayAnimId);
  clearTimeout(replayLoopId);
  replayAnimId = null;
  replayLoopId = null;
}

function snapshotHorses() {
  return horses.map(h => ({
    worldX:    h.worldX,
    animName:  h.animName,
    animFrame: h.animFrame,
    animTimer: h.animTimer,
  }));
}

function restoreHorses(snap) {
  const sh = getRaceStageH();
  snap.forEach((s, i) => {
    const h = horses[i];
    if(!h) return;
    h.worldX    = s.worldX;
    h.animName  = s.animName;
    h.animFrame = s.animFrame;
    h.animTimer = s.animTimer;
    positionHorse(h);
    drawHorse(h);
  });
}

// ══════════════════════════════
//  MAIN RACE TICK
// ══════════════════════════════
function raceTick() {
  tick++;

  // Gate hold
  if(gatePhase) {
    gateCountdown--;
    horses.forEach(h=>{setAnim(h,'idle'); advanceAnim(h,16);});
    // Use same leader-follow camera as race — no snap when gates open
    const gLeader = horses.reduce((b,h)=>h.worldX>b.worldX?h:b, horses[0]);
    cameraX = Math.max(0, worldToStageX(gLeader.worldX) - VIEWPORT_W*0.65);
    applyCamera();
    updateProgressMap();
    if(gateCountdown<=0){gatePhase=false; openGates(); announce("AND THEY ARE RACING");}
    animFrame=requestAnimationFrame(raceTick); return;
  }

  const sh=getStageH();
  const thirdFinished = finishOrder.length>=3;

  horses.forEach(horse=>{
    if(horse.dead){
      if(horse.animName!=='death'&&horse.animName!=='rear'){setAnim(horse,'rear');}
      if(horse.animName==='rear'&&horse.animFrame>=ANIM.rear.frames-1) setAnim(horse,'death');
      if(horse.animName==='death'&&horse.animFrame>=ANIM.death.frames-1){horse.animFrame=ANIM.death.frames-1;horse.animTimer=0;}
      else advanceAnim(horse,10);
      return;
    }

    if(horse.finished){
      const distPast = horse.worldX - (START_X + RACE_LENGTH);
      const coastSpeed = horse._raceParams ? horse._raceParams.topSpeed : 2.5;
      const runEnd  = 800;
      const walkEnd = 2000 + (horse._grazeOffset || 0);
      if(distPast < runEnd) {
        // Run through finish line
        horse.worldX += horse.finishSpeed || coastSpeed;
        setAnim(horse,'run'); advanceAnim(horse,10);
      } else if(distPast < walkEnd) {
        // Slow to a long cooling walk
        horse.worldX += coastSpeed * 0.15;
        setAnim(horse,'walk'); advanceAnim(horse,18);
      } else {
        // Stop and graze — force into eat1 on first graze tick, then alternate
        if(!horse._grazing) {
          horse._grazing = true;
          horse._eatPhase = 1;
          horse.animName = null; // force setAnim to trigger unconditionally
        }
        // eat1 frames 2-5 have grass in mouth, eat2 frames 0-2 have grass in mouth
        // Cycle: eat1[2→5] then eat2[0→2] then repeat
        if(horse._eatPhase === 1) {
          if(horse.animName !== 'eat1') { horse.animName='eat1'; horse.animFrame=2; horse.animTimer=0; }
          horse.animTimer++;
          if(horse.animTimer >= 14) {
            horse.animTimer = 0;
            horse.animFrame++;
            if(horse.animFrame > 5) {
              horse._eatPhase = 2;
              horse.animFrame = 0; // eat2 starts at frame 0
            }
          }
        } else {
          if(horse.animName !== 'eat2') { horse.animName='eat2'; horse.animFrame=0; horse.animTimer=0; }
          horse.animTimer++;
          if(horse.animTimer >= 14) {
            horse.animTimer = 0;
            horse.animFrame++;
            if(horse.animFrame > 2) {
              horse._eatPhase = 1;
              horse.animFrame = 2; // eat1 restarts at frame 2
            }
          }
        }
        drawHorse(horse);
      }
      positionHorse(horse);
      return;
    }

    const prog=(horse.worldX-START_X)/RACE_LENGTH;

    // Death chance
    if(!horse.dead && !horse.finished) tryDeath(horse, prog);
    if(horse.dead) return;

    // Stat-driven speed
    const spd = tickHorseSpeed(horse, prog);
    const animSpeed = spd > horse._raceParams.topSpeed * 0.75 ? 8 : 12;
    setAnim(horse,'run');

    advanceAnim(horse,animSpeed);
    horse.worldX+=Math.max(0,spd);

    if(horse.worldX>=START_X+RACE_LENGTH&&!horse.finished){
      horse.finished=true; horse.finishRank=finishOrder.length;
      horse.crossingX = horse.worldX; // snapshot exact position at crossing
      horse.finishSpeed = spd;        // snapshot speed at crossing
      horse.finishTick = tick;        // snapshot tick for finish time
      finishOrder.push(horse); clearChaos(horse);
      // During recording the gap isn't known yet — suppress board update to avoid
      // showing wrong names or incorrect PHOTO FINISH rows.
      // stopClusterRecording will mark the correct positions and call updateFinishBoard
      // once the gap is confirmed. Outside recording, update immediately.
      if(!isRecording) updateFinishBoard();
      if(horse.finishRank===0){
        announce(`${horse.def.name.toUpperCase()} — FIRST PAST THE POST`);
        flashScreen('rgba(200,151,26,0.4)'); shakeViewport();
      }
    }

    positionHorse(horse);
  });

  // Cluster recording:
  // Captures any close finish that involves at least one podium position (1st, 2nd, or 3rd).
  // "At least one podium spot still open" = fewer than 3 horses have finished.
  // The approaching cluster must include a horse that would fill a podium spot,
  // i.e. the next finisher will be placed 3rd or better.
  // This covers all meaningful permutations:
  //   · 1st/2nd battle        — finishOrder.length = 0, both approaching
  //   · 2nd/3rd battle        — finishOrder.length = 1, both approaching
  //   · 3rd/4th battle        — finishOrder.length = 2, both approaching (3rd spot still open)
  //   · all three together    — finishOrder.length = 0, 3 approaching
  // A pure 4th/5th (or lower) battle is NOT recorded — podium already full.
  {
    const finishLineX = START_X + RACE_LENGTH;
    // At least one podium spot still open
    const podiumOpen = finishOrder.length < 3;
    // Only unfinished horses approaching (not yet crossed)
    const approaching = horses.filter(h =>
      !h.dead && !h.finished &&
      (finishLineX - h.worldX) > 0 &&
      (finishLineX - h.worldX) < CONFIG.recordingWindowPx
    );
    // The next finisher would take position finishOrder.length (0-indexed).
    // Only worth recording if that position is a podium spot (0, 1, or 2).
    const nextPlaceIsPodium = finishOrder.length < 3;
    // Start: podium open, next place is podium, 2+ horses approaching, no replay saved yet
    const shouldStart = podiumOpen && nextPlaceIsPodium && approaching.length >= 2 && !replaySlot;
    // Stop: all cluster members have crossed the finish line
    const shouldStop = isRecording && activeSlot &&
      [...activeSlot.members].every(h => h.finished || h.dead);

    if(shouldStart && !isRecording) {
      startClusterRecording(new Set(approaching));
    } else if(isRecording && activeSlot && approaching.length > 0) {
      // Absorb any horse that joins the cluster window mid-approach
      approaching.forEach(h => activeSlot.members.add(h));
    }

    if(shouldStop) {
      // Use the two most recent finishers — they are the pair we just recorded
      const lastTwo = finishOrder.slice(-2);
      const gap = lastTwo.length === 2 && lastTwo[0].finishTick != null && lastTwo[1].finishTick != null
        ? Math.abs(lastTwo[0].finishTick - lastTwo[1].finishTick)
        : 999;
      stopClusterRecording(gap);
    }
  }

  // 3rd place crossed — wait for ALL living horses to finish before triggering sequence
  if(!raceOver && finishOrder.length >= 3){
    raceOver=true;
    function waitAllFinished() {
      const allDone = horses.every(h => h.finished || h.dead);
      if(allDone) {
        triggerFinishSequence();
      } else {
        setTimeout(waitAllFinished, 200);
      }
    }
    setTimeout(waitAllFinished, 500); // small initial delay so 3rd+ horses run a bit past line
  }

  // Camera — follow winner in postrace, otherwise follow leader
  if(phase==='postrace' && finishOrder[0]) {
    const winner=finishOrder[0];
    const targetX=Math.max(0,worldToStageX(winner.worldX)-VIEWPORT_W*0.5);
    cameraX+=(targetX-cameraX)*0.04;
    currentZoom+=(1.0-currentZoom)*0.03;
    applyCamera();
    animFrame=requestAnimationFrame(raceTick);
    return;
  }

  // Camera — simple pan following leader, locks when leader reaches finish
  const leader=horses.reduce((b,h)=>h.worldX>b.worldX?h:b,horses[0]);
  const leaderProgress=(leader.worldX-START_X)/RACE_LENGTH;

  const finishX = finishStageX();
  const lockedCamX = Math.max(0, finishX - VIEWPORT_W * 0.65);

  if(leaderProgress >= 1.0) {
    // Lock camera at finish
    cameraX += (lockedCamX - cameraX) * 0.06;
  } else {
    // Keep leader at 65% from left, smoothly pan
    const targetX = Math.max(0, worldToStageX(leader.worldX) - VIEWPORT_W * 0.65);
    // Don't pan past the finish cam position
    cameraX += (Math.min(targetX, lockedCamX) - cameraX) * 0.06;
  }
  const targetZoom = 1.1;
  currentZoom += (targetZoom - currentZoom) * 0.025;
  applyCamera();


  // Milestones
  if(tick===1) announce(`FIELD OF ${CONFIG.horsesPerRace} — ${RACE_DISTANCE}M ${RACE_TERRAIN} — ${RACE_WEATHER.label.toUpperCase()}`);
  if(leaderProgress>0.25&&lastMilestone<1){lastMilestone=1;announce(`${leader.def.name.toUpperCase()} SHOWING EARLY`);}
  if(leaderProgress>0.5&&lastMilestone<2){lastMilestone=2;announce(`HALFWAY — ${leader.def.name.toUpperCase()} TO THE FORE`);}
  if(leaderProgress>0.75&&lastMilestone<3){lastMilestone=3;announce(`THREE QUARTERS — WATCH THE BACKMARKERS`);}

  updateProgressMap();
  recordReplayFrame();
  animFrame=requestAnimationFrame(raceTick);
}

// ══════════════════════════════
//  FINISH SEQUENCE
// ══════════════════════════════
function triggerFinishSequence() {
  stopReplayRecording();

  if(replaySlot) {
    setTimeout(() => {
      doWipe(() => {
        if(animFrame) { cancelAnimationFrame(animFrame); animFrame=null; }
        const liveSnap = snapshotHorses();
        const liveCamX = cameraX;
        const liveZoom = currentZoom;
        document.getElementById('progress-bar-overlay').style.display='none';
        announce(replaySlot.gap <= CONFIG.photoFinishFrames
          ? 'PHOTO FINISH — STEWARDS WILL DETERMINE THE RESULT'
          : 'VERY CLOSE FINISH — REPLAY');
        document.getElementById('slowmo-overlay').style.display='flex';
        playReplayIn('race', replaySlot.frames, 1, REPLAY_INTERVAL_SLOW, ()=>{
          setTimeout(() => doWipe(() => {
            document.getElementById('slowmo-overlay').style.display='none';
            restoreHorses(liveSnap);
            cameraX = liveCamX; currentZoom = liveZoom; applyCamera();
            document.getElementById('progress-bar-overlay').style.display='';
            startPostRaceTransition(true);
          }), 3000);
        });
      });
    }, CONFIG.finishHoldMs);
  } else {
    setTimeout(() => doWipe(() => startPostRaceTransition(false)), CONFIG.finishHoldMs);
  }
}

// ══════════════════════════════
//  POST-RACE TRANSITION
// ══════════════════════════════

function startPostRaceTransition(hadSlowmo) {
  const pr=document.getElementById('postrace-ui');
  pr.style.display='grid';
  document.getElementById('race-ui').style.display='none';
  document.getElementById('prerace-ui').style.display='none';

  pr.classList.add('visible');
  stageToPostrace();
  ['postrace-info-table','podium-table'].forEach(id=>document.getElementById(id).classList.add('visible'));

  document.getElementById('btn-action').textContent='New Race';
  document.getElementById('btn-action').disabled=false;
  setStatusText('Race Complete');

  // Show first (most significant) cluster in postrace cam
  const postSlot = replaySlot;
  if(hadSlowmo && postSlot && postSlot.frames.length > 0){
    // Stop raceTick so it doesn't fight replay over camera/positions
    if(animFrame) { cancelAnimationFrame(animFrame); animFrame=null; }
    const livePostSnap = snapshotHorses();
    const livePostCamX = cameraX;
    const livePostZoom = currentZoom;
    populatePostRace(false, true); // photo finish placeholders — reveals clear placings immediately, blanks contested ones
    const badge = document.getElementById('postrace-replay-badge');
    badge.style.display = 'block';

    // Replay duration = frames * interval
    const replayDurationMs = postSlot.frames.length * REPLAY_INTERVAL_SLOW;
    // Reveal results at a random time: min 3s, max replay duration
    const revealMs = Math.min(
      Math.max(10000, 10000 + Math.random() * 5000),
      replayDurationMs - 500
    );
    const revealTimer = setTimeout(() => populatePostRace(false, false), revealMs);

    // Loop replay — hold last frame for 3s between each pass
    function loopReplay() {
      playReplayIn('winner', postSlot.frames, 1, REPLAY_INTERVAL_SLOW, ()=>{
        replayLoopId = setTimeout(loopReplay, 3000);
      });
    }
    loopReplay();
  } else {
    // No replay — populate all results immediately and go straight to winner trot cam
    populatePostRace(false, false);
    startWinnerTrotCam();
  }
}

function startWinnerTrotCam() {
  // raceTick keeps running — just switch phase so camera follows winner
  phase = 'postrace';
}

function winLength(gapFrames) {
  // gapFrames: difference in finishTick (frame count) between two horses
  const gapSecs = gapFrames / 60;
  if(gapSecs < 0.05)  return 'Nose';
  if(gapSecs < 0.12)  return 'Short Head';
  if(gapSecs < 0.22)  return 'Head';
  if(gapSecs < 0.35)  return 'Neck';
  if(gapSecs < 0.65)  return '½L';
  if(gapSecs < 1.00)  return '¾L';
  if(gapSecs < 1.40)  return '1L';
  if(gapSecs < 1.90)  return '1¼L';
  if(gapSecs < 2.50)  return '1½L';
  if(gapSecs < 3.20)  return '2L';
  if(gapSecs < 4.50)  return '3L';
  if(gapSecs < 6.50)  return '4L';
  return (Math.round(gapSecs * 0.8)) + 'L';
}

function populatePostRace(placingsHidden, photoFinish) {

  // Podium table
  document.querySelector('#podium-table thead th.name-col').textContent = RACECOURSE.name;
  const tbody = document.getElementById('podium-tbody');
  tbody.innerHTML = '';
  finishOrder.slice(0,3).forEach((h,i)=>{
    const idx  = raceHorses.indexOf(h.def);
    const win  = (odds[idx]?.win||0).toFixed(2);
    const plc  = (odds[idx]?.win*0.35||0).toFixed(2);
    // Margin: how far this horse finished ahead of the next horse (i+1)
    const next    = finishOrder[i + 1];
    const marginGap = next && h.finishTick != null && next.finishTick != null
      ? Math.abs(next.finishTick - h.finishTick) : null;
    const margin  = marginGap != null ? winLength(marginGap) : '—';
    // Rolling form: drop the oldest result, append this finishing position (1st/2nd/3rd)
    const placeLabel = ['1','2','3'][i];
    const rawForm  = Array.isArray(h.def.form) ? h.def.form.map(f=>String(f.pos)) : (h.def.form||'').split('-').filter(Boolean);
    const rollingForm = [...rawForm.slice(1), placeLabel].join('-');
    const tr = document.createElement('tr');
    // Only blank this row if THIS specific placing is part of a photo finish gap
    const thisIsPhoto = photoFinish && isPhotoFinishPosition(i);
    if(thisIsPhoto) {
      tr.innerHTML = `<td class="num-cell" style="background:#555"><span class="silk">?</span></td><td class="name-cell" colspan="5" style="text-align:center;letter-spacing:3px;color:#999;">PHOTO FINISH</td>`;
    } else {
      const minOdds = Math.min(...odds.map(o=>o.win));
      const isFav = (odds[idx]?.win||999) === minOdds;
      const favTag = isFav ? '<span class="fav-tag">FAV</span>' : '';
      const badge = STYLE_BADGE[h.def.style] || { letter:'?', color:'#888' };
      const styleBadge = `<span class="style-badge" style="background:${badge.color}">${badge.letter}</span>`;
      tr.innerHTML = `<td class="num-cell" style="background:${h.def.silk?h.def.silk.background:'#555'}"><span class="silk">${h.def.num}</span></td><td class="name-cell">${h.def.name.toUpperCase()}${styleBadge}${favTag}</td><td class="odds-cell">${win}</td><td class="odds-cell">${plc}</td><td class="odds-cell">${margin}</td><td class="odds-cell">${rollingForm}</td>`;
    }
    tbody.appendChild(tr);
  });

  // Info grid
  const wi=raceHorses.indexOf(finishOrder[0]?.def);
  const p1i=raceHorses.indexOf(finishOrder[1]?.def);
  const p2i=raceHorses.indexOf(finishOrder[2]?.def);
  const wo=odds[wi]?.win||1, p1o=odds[p1i]?.win||1, p2o=odds[p2i]?.win||1;
  document.getElementById('pi-course').textContent = RACECOURSE.name;
  document.getElementById('pi-dist').textContent   = `${RACE_DISTANCE}m — ${RACE_TERRAIN}`;
  document.getElementById('pi-track').textContent  = `${RACE_WEATHER.label} (${RACE_WEATHER.railCondition})`;
  document.getElementById('pi-field').textContent  = `${raceHorses.length} Runners`;
  document.getElementById('pi-divs').textContent   = `Win $${wo.toFixed(2)} / Tri $${(wo*p1o*p2o*0.3).toFixed(2)}`;

  if(placingsHidden) {
    ['postrace-info-table','podium-table'].forEach(id=>document.getElementById(id).classList.remove('visible'));
  } else {
    ['postrace-info-table','podium-table'].forEach(id=>document.getElementById(id).classList.add('visible'));
  }
}

// ══════════════════════════════
//  COUNTDOWN + BEGIN
// ══════════════════════════════
let countdownInterval=null;

const PHRASES = [
  "Just a little fun!",
  "It's all good!",
  "And they're off!",
  "Who's your pick?",
  "Back the right horse!",
  "May the best horse win!",
  "Place your bets!",
  "Eyes on the track!",
  "Next race loading...",
  "It's a great day for racing!",
];

let _wipeCleanupId = null;
function doWipe(callback) {
  const w = document.getElementById('wipe-overlay');
  const p = document.getElementById('wipe-phrase');
  p.textContent = PHRASES[Math.floor(Math.random()*PHRASES.length)];
  // Cancel any pending cleanup from a previous wipe
  if(_wipeCleanupId) { clearTimeout(_wipeCleanupId); _wipeCleanupId=null; }
  // Instantly position wipe off-screen left with no transition, then slide in
  w.style.transition = 'none';
  w.classList.remove('out');
  w.classList.remove('in');
  void w.offsetWidth;
  w.style.transition = '';
  w.classList.add('in');
  setTimeout(() => {
    callback();
    w.classList.remove('in');
    w.classList.add('out');
    _wipeCleanupId = setTimeout(() => {
      w.style.transition = 'none';
      w.classList.remove('out');
      void w.offsetWidth;
      w.style.transition = '';
      _wipeCleanupId = null;
    }, 800);
  }, 2000);
}

function startCountdown() {
  let secs=CONFIG.countdownSeconds;
  const el=document.getElementById('countdown-timer');
  const btn=document.getElementById('btn-action');
  updateCD(el,secs);

  countdownInterval=setInterval(()=>{
    secs--;
    updateCD(el,secs);
    if(secs<=10) el.classList.add('urgent');
    if(secs===0){
      // Bets can now be finalised — enable the button but keep counting into negatives
      btn.disabled=false;
      btn.textContent='Finalise Bets';
    }
  },1000);
}

function updateCD(el,s) {
  const neg = s < 0;
  const abs = Math.abs(s);
  el.textContent=`${neg ? '-' : ''}${Math.floor(abs/60)}:${(abs%60).toString().padStart(2,'0')}`;
}

function beginRace() {
  stopWalkUp();
  stopReplay();
  clearInterval(countdownInterval);

  document.getElementById('prerace-ui').style.display='none';
  stageToRace(true);

  // Set camera to leader-follow position immediately so gate phase uses same camera logic
  const sh = getRaceStageH();
  const GATE_STOP_X = GATE_WORLD_X - DRAW_W - 20;
  currentZoom = 1.1; targetZoom = 1.1;
  // Leader-follow formula: leader at 65% from left
  cameraX = Math.max(0, worldToStageX(GATE_STOP_X) - VIEWPORT_W*0.65);
  applyCamera();

  horses.forEach((h,i) => {
    h.worldX = GATE_STOP_X;
    positionHorse(h);
    setAnim(h,'idle'); drawHorse(h);
    // Show name tag now that race is starting
    const tag = h.wrap.querySelector('.horse-name-tag');
    if(tag) tag.style.display = '';
  });

  phase='racing';
  raceOver=false; tick=0; finishOrder=[]; dnfOrder=[]; lastMilestone=-1;
  directorTick=0; directorDuration=300; camShot='PACK';
  gatePhase=true; gateCountdown=300;
  slowmoActive=false; replayFrames=[]; replaySlot=null; activeSlot=null; isRecording=false; secondaryCloseGap=null; photoFinishPositions=new Set();

  buildGates();
  buildProgressMap();
  announce(`${RACECOURSE.name.toUpperCase()} — ${RACE_DISTANCE}M ${RACE_TERRAIN} — ${RACE_WEATHER.label.toUpperCase()}`);

  horses.forEach(h=>{
    const params = buildRaceParams(h.def, h._luck || 1.0); // _luck is race-day variance
    h._raceParams   = params;
    h._currentSpeed = params.topSpeed * 0.30; // start from a standing-ish pace
    h._stamina      = params.staminaPool;
    h._fadeAccum    = 0;
    h._grazing      = false;
    // Random per-horse offset so they peel off to graze at different distances past finish
    h._grazeOffset  = Math.floor(Math.random() * 600);  // 0–600px stagger
    h.dead=false; h.eatPhase=1;
    h.finished=false; h.finishRank=null;
    drawHorse(h);
  });

  document.getElementById('btn-action').textContent='Racing...';
  document.getElementById('btn-action').disabled=true;
  setStatusText(`${RACECOURSE.name} — ${RACE_DISTANCE}m — ${RACE_WEATHER.label}`);

  animFrame=requestAnimationFrame(raceTick);
}

// ══════════════════════════════
//  HORSE GRIDS
// ══════════════════════════════
const STYLE_BADGE = {
  FRONT_RUNNER: { letter:'F', color:'#27AE60' },
  PACE_CHASER:  { letter:'P', color:'#2980B9' },
  LATE_SURGER:  { letter:'L', color:'#F39C12' },
  END_CLOSER:   { letter:'E', color:'#C0392B' },
};

function formString(horse) {
  const form = horse.form || horse.def?.form;
  if(!form || !form.length) return '—';
  if(Array.isArray(form)) return form.slice(-5).map(f=>f.pos).join('-');
  return String(form).split('-').slice(-5).join('-');
}

function buildGrids() {
  const minOdds = Math.min(...odds.map(o=>o.win));
  const half = Math.ceil(raceHorses.length / 2);
  ['grid-left','grid-right'].forEach(id=>{
    document.getElementById(id).innerHTML=`<thead><tr><th></th><th class="name-col">Runner</th><th class="odds-col">Win</th><th class="odds-col">Place</th><th class="form-col">Form</th></tr></thead><tbody></tbody>`;
  });
  raceHorses.forEach((h,i)=>{
    const isFav = odds[i].win === minOdds;
    const fav   = isFav ? '<span class="fav-tag">FAV</span>' : '';
    const badge = STYLE_BADGE[h.style] || { letter:'?', color:'#888' };
    const styleBadge = `<span class="style-badge" style="background:${badge.color}">${badge.letter}</span>`;
    const row=`<tr>
      <td class="num-cell" style="position:relative;padding:0;width:56px;overflow:hidden;">
        <img src="${silkDataUri(h.silk, 56)}" width="56" height="56" style="display:block;">
        <span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:1.6rem;font-weight:800;color:#fff;text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000;">${h.num}</span>
      </td>
      <td class="name-cell">${h.name}${styleBadge}${fav}</td>
      <td class="odds-cell">${odds[i].win.toFixed(2)}</td>
      <td class="odds-cell">${odds[i].place.toFixed(2)}</td>
      <td class="form-cell">${formString(h)}</td>
    </tr>`;
    document.getElementById(i<half?'grid-left':'grid-right').querySelector('tbody').innerHTML+=row;
  });
}

// ══════════════════════════════
//  INIT
// ══════════════════════════════
function resetToPrerace() {
  // Stop all running loops including any looping replay
  if(animFrame) { cancelAnimationFrame(animFrame); animFrame=null; }
  stopReplay();
  stopWalkUp();
  stopWeatherParticles();
  clearInterval(countdownInterval);

  // Reset state
  phase='prerace'; raceOver=false; finishOrder=[]; dnfOrder=[]; tick=0; photoFinishPositions=new Set();

  // Hide postrace, show prerace
  const pr=document.getElementById('postrace-ui');
  pr.classList.remove('visible');
  pr.style.display='none';
  ['postrace-info-table','podium-table'].forEach(id=>document.getElementById(id).classList.remove('visible'));
  document.getElementById('prerace-ui').style.display='flex';
  document.getElementById('race-ui').style.display='none';

  // Hide gate overlay so it gets rebuilt fresh by walkUpTick
  document.getElementById('gate-overlay').style.display='none';
  document.querySelectorAll('.gate-el').forEach(e=>e.remove());

  // Reset status banner and button (setStatusText called by init below)
  document.getElementById('btn-action').textContent='Finalise Bets';
  document.getElementById('btn-action').disabled=true;
  document.getElementById('countdown-timer').classList.remove('urgent');

  // Re-init
  init();
}

function init() {
  setupRace();

  document.getElementById('course-name').textContent=RACECOURSE.name;
  document.getElementById('race-label').textContent=`${RACE_DISTANCE}m — ${RACE_TERRAIN} — ${RACE_WEATHER.label}`;


  loadSheets(raceHorses).then(()=>{
    buildWorld();
    initWeatherParticles();
    stageToPrerace();
    buildHorses(true); // horses start walking up
    buildGates(); // show gates in walk-up cam
    buildGrids();

    // Seed camera at the horses' starting position so the pan begins there.
    currentZoom = 1.1;
    targetZoom  = 1.1;
    const leftmostX = Math.min(...horses.map(h => h.worldX));
    cameraX = Math.max(0, worldToStageX(leftmostX) - 40);
    // Fixed pan speed: travel from start to gate position over 85% of countdown
    walkcamTarget = Math.max(0, worldToStageX(GATE_WORLD_X) - (VIEWPORT_W * 0.25) / currentZoom);
    walkcamSpeed  = (walkcamTarget - cameraX) / (CONFIG.countdownSeconds * 0.85 * 60);
    applyCamera();

    // Slide out opening wipe after a hold — first load only
    if(!window._hasLoaded) {
      window._hasLoaded = true;
      const w = document.getElementById('wipe-overlay');
      w.style.transition = 'none';
      w.classList.add('in');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        w.style.transition = '';
        setTimeout(() => {
          w.classList.remove('in');
          w.classList.add('out');
          setTimeout(() => {
            w.style.transition = 'none';
            w.classList.remove('out');
            requestAnimationFrame(() => requestAnimationFrame(() => { w.style.transition = ''; }));
          }, 800);
        }, 2000);
      }));
    }

    // Start walk-up animation
    walkUpTick();
    startCountdown();

    const btn=document.getElementById('btn-action');
    setStatusText('Accepting Bets');
    btn.textContent='Finalise Bets';
    btn.disabled=true; // disabled until countdown reaches zero
    btn.onclick=()=>{
      if(phase==='prerace'){
        btn.disabled=true;
        btn.textContent='Starting Soon';
        setStatusText('Bets Closed');
        // Random 5–10 second delay before race starts, like a real jump
        const delay = (5 + Math.random()*5) * 1000;
        setTimeout(()=>doWipe(beginRace), delay);
      } else if(phase==='postrace'||raceOver) doWipe(resetToPrerace);
    };
  });
}

let _tickerRaf   = null;
let _tickerX     = 0;
let _tickerStep  = 0.6;
let _tickerUnit  = 0;
let _tickerBuilt = false;

function _tickerLoop() {
  const el = document.getElementById('status-text');
  if(!el) { _tickerRaf = null; return; }
  _tickerX -= _tickerStep;
  if(_tickerUnit > 0 && _tickerX <= -_tickerUnit) _tickerX += _tickerUnit;
  el.style.transform = 'translateX(' + _tickerX + 'px)';
  _tickerRaf = requestAnimationFrame(_tickerLoop);
}

function setStatusText(msg) {
  const el   = document.getElementById('status-text');
  const clip = document.getElementById('status-clip');
  if(!el || !clip) return;

  if(_tickerBuilt) {
    // Already running — swap text then remeasure unit width (phrase length may have changed)
    el.querySelectorAll('.ticker-copy').forEach(s => s.textContent = msg);
    requestAnimationFrame(() => {
      const copies = el.querySelectorAll('.ticker-copy');
      if(copies.length >= 2) {
        const pageScale = Math.min(window.innerWidth / PAGE_W, window.innerHeight / PAGE_H);
        const screenUnit = copies[1].getBoundingClientRect().left - copies[0].getBoundingClientRect().left;
        _tickerUnit = Math.abs(screenUnit / pageScale);
      }
    });
    return;
  }

  // First call only: build DOM, measure, fill, start loop
  _tickerBuilt = true;
  const mkCopy = () => {
    const s = document.createElement('span');
    s.className = 'ticker-copy';
    s.textContent = msg;
    el.appendChild(s);
    const sep = document.createElement('span');
    sep.className = 'ticker-sep';
    sep.textContent = '\u00a0\u00a0\u25c6\u00a0\u00a0';
    el.appendChild(sep);
  };
  mkCopy(); mkCopy();

  requestAnimationFrame(() => {
    const copies = el.querySelectorAll('.ticker-copy');
    if(copies.length >= 2) {
      // getBoundingClientRect returns scaled screen px; divide by page scale to get
      // the unscaled coordinate space that translateX operates in
      const pageScale = Math.min(window.innerWidth / PAGE_W, window.innerHeight / PAGE_H);
      const screenUnit = copies[1].getBoundingClientRect().left - copies[0].getBoundingClientRect().left;
      _tickerUnit = screenUnit / pageScale;
    }
    // clip.offsetWidth is already in unscaled px — no correction needed
    const needed = _tickerUnit > 0 ? Math.ceil((clip.offsetWidth * 2) / _tickerUnit) + 2 : 8;
    while(el.querySelectorAll('.ticker-copy').length < needed) mkCopy();
    _tickerX = 0;
    _tickerRaf = requestAnimationFrame(_tickerLoop);
  });
}

loadGameData().then(()=>init()).catch(err=>{
  console.error('Failed to load game data:', err);
  // Fallback message if JSON files not found
  document.getElementById('course-name').textContent = 'DATA ERROR';
  document.getElementById('race-label').textContent = 'Could not load horses.json / courses.json / weather.json';
});
