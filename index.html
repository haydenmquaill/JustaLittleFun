<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Join the room</title>

<!-- Add to Home Screen / PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a2e5a">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JALF Join">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#1a2e5a; --blue-lt:#243d7a; --blue-deep:#0d1c3a;
    --white:#fff; --offwhite:#f4f6fa; --line:#d8deea;
    --ink:#16203a; --ink-soft:#5b6478;
    --mid:#8a93a8; --dark:#111;
    --ok:#1e7d3a; --err:#c8102e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    /* engine green felt, behind */
    background:
      radial-gradient(ellipse at 20% 30%, rgba(30,125,58,0.14) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 60%, rgba(26,46,90,0.28) 0%, transparent 60%),
      #0d1f12;
    color:var(--white);
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:24px 18px calc(24px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }

  /* Masthead — skewed navy broadcast banner */
  .mast{width:100%;max-width:440px;margin:6px 0 22px}
  .mast .banner{
    background:var(--blue); box-shadow:0 2px 12px rgba(0,0,0,0.4);
    transform:skewX(-8deg); padding:14px 22px;
    display:flex; flex-direction:column; gap:2px;
  }
  .mast .banner > *{transform:skewX(8deg)}
  .mast .rail{
    font-family:'Oswald',sans-serif;letter-spacing:.34em;
    font-size:11px;color:rgba(255,255,255,0.6);text-transform:uppercase;
  }
  .mast h1{
    font-family:'Barlow Condensed',sans-serif;font-weight:800;
    font-size:40px;line-height:.95;letter-spacing:.01em;text-transform:uppercase;
    color:var(--white);
  }
  .mast h1 em{font-style:normal;color:rgba(255,255,255,0.5)}

  /* The card — white tile */
  .slip{
    width:100%;max-width:440px;
    background:var(--white);color:var(--ink);
    padding:26px 22px 24px;
    box-shadow:0 12px 30px rgba(0,0,0,.34);
  }
  .slip h2{
    font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:30px;
    letter-spacing:.5px;text-transform:uppercase;color:var(--blue);margin-bottom:2px;
  }
  .slip .sub{font-size:14px;color:var(--ink-soft);margin-bottom:22px;line-height:1.45}

  label{display:block;font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin:0 0 7px 2px}

  input{
    width:100%;font-family:inherit;
    background:var(--offwhite);border:1.5px solid var(--line);
    border-radius:8px;padding:14px 14px;color:var(--ink);
    font-size:17px;transition:border-color .15s, box-shadow .15s;
  }
  input::placeholder{color:var(--mid)}
  input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,46,90,.16)}

  #code{
    font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:.42em;
    font-size:40px;text-align:center;text-indent:.42em;
    padding:8px 14px;color:var(--blue);
  }
  .field{margin-bottom:18px}

  button{
    width:100%;font-family:'Barlow Condensed',sans-serif;font-weight:800;
    letter-spacing:.08em;text-transform:uppercase;
    font-size:26px;border:none;border-radius:8px;cursor:pointer;
    padding:14px;margin-top:4px;color:#fff;
    background:var(--blue);
    box-shadow:0 4px 0 var(--blue-deep);transition:transform .08s, box-shadow .08s;
  }
  button:active{transform:translateY(3px);box-shadow:0 1px 0 var(--blue-deep)}
  button:disabled{opacity:.5;cursor:default;box-shadow:0 4px 0 var(--blue-deep)}

  .msg{min-height:18px;margin-top:13px;font-size:13.5px;text-align:center}
  .msg.err{color:var(--err);font-weight:700}
  .msg.ok{color:var(--ok);font-weight:700}

  footer{margin-top:auto;padding-top:26px;font-family:'Oswald',sans-serif;
    font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:rgba(255,255,255,.4)}
</style>
</head>
<body>

  <div class="mast">
    <div class="banner">
      <span class="rail">JustaLittleFun</span>
      <h1>Join <em>the</em> room</h1>
    </div>
  </div>

  <section class="slip">
    <h2>You're in</h2>
    <p class="sub">Enter the code shown on the big screen, then pick a name to play under.</p>

    <div class="field">
      <label for="code">Room code</label>
      <input id="code" maxlength="4" autocomplete="off" autocapitalize="characters"
             spellcheck="false" inputmode="latin" placeholder="ABCD">
    </div>

    <div class="field">
      <label for="name">Display name</label>
      <input id="name" maxlength="20" autocomplete="off" placeholder="Your name">
    </div>

    <button id="join-btn">Join the room</button>
    <p id="msg" class="msg"></p>
  </section>

  <footer>Play money only · No real wagering</footer>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ───────────────────────────────────────────────────────────────
   Supabase credentials (safe in client code; RLS protects data).
─────────────────────────────────────────────────────────────── */
const SUPABASE_URL  = 'https://lhzxsjjgsvlnlixygjif.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxoenhzampnc3ZsbmxpeHlnamlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MjI4MjIsImV4cCI6MjA5ODE5ODgyMn0.-AyZ1kr3iNwk7iAyPhGlqmHXvASBYWBtPSiROP6pSsQ';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ───────────────────────────────────────────────────────────────
   Route convention (no map needed):
   the player-view page for a mode is named after the game_mode
   string the screen stored on the session. mode 'horses'
   → 'horses.html'. Add a game by creating a page whose
   filename matches its mode string — nothing to register here.
─────────────────────────────────────────────────────────────── */
const KNOWN_MODES = ['horses'];   // guard list; extend as you add pages
const routeForMode = mode => `${mode}.html`;

/* ─── element refs ─── */
const $ = id => document.getElementById(id);
const codeInput = $('code'), nameInput = $('name'), joinBtn = $('join-btn'), msg = $('msg');

/* ─── helpers ─── */
function showMsg(text, kind){ msg.textContent = text; msg.className = 'msg' + (kind ? ' '+kind : ''); }

/* keep code box uppercase + letters only */
codeInput.addEventListener('input', () => {
  codeInput.value = codeInput.value.replace(/[^a-zA-Z]/g,'').toUpperCase().slice(0,4);
});

/* ─── join flow ─── */
joinBtn.addEventListener('click', joinRoom);
nameInput.addEventListener('keydown', e => { if(e.key==='Enter') joinRoom(); });
codeInput.addEventListener('keydown', e => { if(e.key==='Enter') nameInput.focus(); });

async function joinRoom(){
  const code = codeInput.value.trim().toUpperCase();
  const name = nameInput.value.trim();
  if(code.length !== 4){ showMsg('Room codes are four letters.', 'err'); return; }
  if(!name){ showMsg('Pick a display name first.', 'err'); return; }

  joinBtn.disabled = true; showMsg('Finding the room…');

  // 1) Join — inserts the player, returns the players row (id, session_id, …).
  const { data: player, error } = await supabase.rpc('join_session', {
    p_room_code: code, p_display_name: name,
  });

  if(error){
    joinBtn.disabled = false;
    const m = (error.message||'').toLowerCase();
    if(m.includes('no active session')) showMsg('No room with that code. Check the big screen.', 'err');
    else if(m.includes('not accepting')) showMsg('That game has already started.', 'err');
    else if(m.includes('duplicate') || m.includes('unique')) showMsg('That name’s taken in this room. Try another.', 'err');
    else showMsg(error.message, 'err');
    return;
  }

  // 2) The join RPC returns only the player row, so do one cheap read to learn
  //    the game mode → which player view to redirect to.
  const { data: session, error: sErr } = await supabase
    .from('sessions').select('game_mode').eq('id', player.session_id).single();

  if(sErr || !session){
    joinBtn.disabled = false;
    showMsg('Joined, but couldn’t read the game. Try again.', 'err');
    return;
  }

  const route = KNOWN_MODES.includes(session.game_mode)
    ? routeForMode(session.game_mode)
    : null;
  if(!route){
    joinBtn.disabled = false;
    showMsg('Unknown game mode for this room.', 'err');
    return;
  }

  // 3) Redirect to the game's player view. The URL carries the two keys the
  //    next page needs to rebuild everything from the DB on load/refresh:
  //    room code (→ session row) and player id (→ this player's row).
  showMsg('You’re in! Taking you to the game…', 'ok');
  const url = `${route}?code=${encodeURIComponent(code)}&pid=${encodeURIComponent(player.id)}`;
  window.location.href = url;
}
</script>
</body>
</html>
